server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API requests are proxied to the storage-api backend. A runtime DNS
    # resolver (Docker's embedded DNS) is used so a restarted `server`
    # container with a new IP is picked up without restarting nginx.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream http://server:8787;
        proxy_pass $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA + multi-entry widgets: serve the file if it exists, otherwise fall
    # back to the app shell so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
