# Development stack with hot reload. Run with:
#   pnpm docker:dev        -> docker compose -f docker-compose.dev.yml up --build
#   pnpm docker:dev:down   -> tear it down
#
# - client: Vite dev server with HMR at http://localhost:5173
# - server: storage-api auto-restarted on change via `tsx watch`
# - source is bind-mounted; file watching uses polling
#   (CHOKIDAR_USEPOLLING) so edits on a Windows/macOS host are detected
#   reliably through the Docker bind mount. node_modules lives in a named
#   volume so the host's (Windows) install is not clobbered by the
#   container's (Linux) install, and stays cached across restarts.
services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - '127.0.0.1:6379:6379'

  server:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm exec tsx watch server/index.ts"
    environment:
      VALKEY_URL: redis://valkey:6379
      PORT: '8787'
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - .:/app
      - server_node_modules:/app/node_modules
    ports:
      - '127.0.0.1:8787:8787'
    depends_on:
      - valkey

  client:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --host"
    environment:
      VITE_API_PROXY: http://server:8787
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - .:/app
      - client_node_modules:/app/node_modules
    ports:
      - '5173:5173'
    depends_on:
      - server

volumes:
  server_node_modules:
  client_node_modules:
