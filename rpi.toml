schema = 1

[project]
name = "myboard"

[source]
repo = "git@github.com:khmilevoi/myboard.git"
branch = "main"

[build]
compose = "docker-compose.yml"

[ingress]
service = "client"
port = 80
expose = "lan"

[healthcheck]
path = "/"
expect = "200"
timeout = "60s"

# The Pi builds every widget remote, assembles the client PWA/nginx image, and
# builds the server image in one Compose release. Keep at least five minutes of
# observed headroom when this pipeline changes.
[timeouts]
build = "30m"

# create-invite needs Node + VALKEY_URL/PUBLIC_APP_URL, which only exist in the
# server container; ingress.service (client) is a bare nginx image.
[commands.create-invite]
run = "node dist/scripts/create-invite.cjs"
service = "server"
