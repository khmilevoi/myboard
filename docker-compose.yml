services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - '6379:6379'

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      VALKEY_URL: redis://valkey:6379
      PORT: '8787'
    depends_on:
      - valkey
    ports:
      - '8787:8787'

  client:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --host"
    environment:
      VITE_API_PROXY: http://server:8787
    volumes:
      - .:/app
    ports:
      - '5173:5173'
    depends_on:
      - server
