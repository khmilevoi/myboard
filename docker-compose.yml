services:
  valkey:
    image: valkey/valkey:8-alpine
    # AOF so board data survives an unclean stop, not just periodic snapshots.
    command: valkey-server --appendonly yes
    volumes:
      - valkey_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      VALKEY_URL: redis://valkey:6379
      PORT: '8787'
    depends_on:
      valkey:
        condition: service_healthy
    expose:
      - '8787'
    healthcheck:
      # /api/time is the cheapest existing route; wget ships in busybox.
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8787/api/time']
      interval: 15s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '127.0.0.1:8080:80'
    restart: unless-stopped

  browser-automation:
    build:
      context: .
      dockerfile: packages/browser-automation/Dockerfile
    init: true
    environment:
      PORT: '8788'
      # Non-secret operational config; Subproject 5 includes it in safe error meta.
      AUTOMATION_SSH_TARGET: ${AUTOMATION_SSH_TARGET:-}
    secrets:
      - source: passport_series
        target: passport-checker_series
      - source: passport_number
        target: passport-checker_number
    expose:
      - '8788'
    ports:
      # noVNC only on the Raspberry Pi loopback; SSH is the access boundary.
      - '127.0.0.1:6080:6080'
    volumes:
      - browser_profile:/profile
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8788/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  valkey_data:
  browser_profile:

secrets:
  passport_series:
    environment: PASSPORT_SERIES
  passport_number:
    environment: PASSPORT_NUMBER
