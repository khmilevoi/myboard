services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - '127.0.0.1:6379:6379'

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      VALKEY_URL: redis://valkey:6379
      PORT: '8787'
    depends_on:
      - valkey
    expose:
      - '8787'

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      - server
    expose:
      - '80'
